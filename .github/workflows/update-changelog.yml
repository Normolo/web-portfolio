name: Update changelog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch merged PRs and write changelog.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list \
            --repo "${{ github.repository }}" \
            --state merged \
            --limit 10 \
            --json number,title,mergedAt,author,url \
            --jq '[.[] | {number: .number, title: .title, merged_at: .mergedAt, url: .url}]' \
            > src/data/changelog.json

      - name: Commit and push if changed
        run: |
          if git diff --quiet src/data/changelog.json; then
            echo "changelog.json unchanged – nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/changelog.json
          # Propagate the PR number from the triggering commit so the footer
          # version logic can still resolve it from a shallow clone.
          TRIGGER_MSG="${{ github.event.head_commit.message }}"
          PR_NUM=$(echo "$TRIGGER_MSG" | grep -oP 'Merge pull request #\K\d+' || true)
          if [ -z "$PR_NUM" ]; then
            PR_NUM=$(echo "$TRIGGER_MSG" | grep -oP '\(#\K\d+(?=\)\s*$)' || true)
          fi
          if [ -n "$PR_NUM" ]; then
            git commit -m "chore: update changelog.json (#$PR_NUM)"
          else
            git commit -m "chore: update changelog.json"
          fi
          git push
